{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h3>Clinics</h3>
    <div class="row g-3">
        {% for clinic in clinics %}
            <div class="col-md-4"><a href="{% url 'clinic_visits_display' id=clinic.id %}">{{ clinic.clinic }}</a>
            {% cycle "" "" "</div><br/><div>" %}
        {% endfor %}
    </div>
</div>

{% endblock %}
