{% extends 'base.html' %}
{% block content %}

<script>

    arr=[];
    $( ".result" ).each(function( index ) {
        key=$( this ).prop('id');
        value=$(this).val();
        arr.push(key+':'+value);   
    });

      console.log(arr);

      obj={};

    $( ".result" ).each(function( index ) {
        key=$( this ).prop('id');
        value=$(this).val();

        obj[key]=value; 
    });

      console.log(obj);

</script>


<div class="container">
    <form id="myForm" method="POST" action="">{% csrf_token %}
       {% for request in lab_request %}
        {{ request.test }}: <input type="text" class="result" id="{{ request.test.id }}" name="{{ request.test.id }}"> <br>
       {% endfor %} 
       <br>
       <!-- <input type="text" id="txtDisplay" class="chkbox">  -->
    <br><br>
    <button>Send Result</button>
    </form>
</div>

{% endblock %}
