{% extends 'base.html' %}
{% block content %}

<script>

    arr=[];
    $( ".result" ).each(function( index ) {
        key=$( this ).prop('id');
        value=$(this).val();
        arr.push(key+':'+value);   
    });

      console.log(arr);

      obj={};

    $( ".result" ).each(function( index ) {
        key=$( this ).prop('id');
        value=$(this).val();

        obj[key]=value; 
    });

      console.log(obj);

</script>

{% if lab_request %}
<div class="container">
    <form id="myForm" method="POST" action="">{% csrf_token %}
       {% for request in lab_request %}
        {{ request.test }}: <input type="text" class="result" id="" name="{{ request.id }}"> 
        <br>
       {% endfor %} 
       <br><br>
    <button>Send Result</button>
    </form>
</div>
{% else %}
<center>
    <div style="color: green;">
        <h1>No pending Investigation for this patient</h1>
        <br>
        <h1>Thank You!</h1>
    </div>
</center>
{% endif %}
{% endblock %}
