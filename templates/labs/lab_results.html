{% extends 'base.html' %}
{% block content %}

<script>
  function fn()
  {
    var myArray = [];
    var form = document.getElementById("myForm").elements;
    for(var i=1; i < (form.length-1); i++)
    {
      // myArray.key = form[i].id;
      // myArray.values = form[i].value;
      myValues = (form[i].id+ ": "+ form[i].value);
      myArray.push(myValues)

      // console.log(form[i].id+ ": "+ form[i].value);
      console.log(myArray);
    }
  }
</script>


<div class="container">
    <form id="myForm" method="POST" action="">{% csrf_token %}

       {% endfor %}
